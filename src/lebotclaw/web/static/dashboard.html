<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LebotClaw 超级小博 · 学习伙伴</title>
<link rel="icon" href="static/avatar.png">
<script>
// 首屏前应用主题，避免闪烁（默认白天——给小朋友的主模式）
document.documentElement.setAttribute("data-theme", localStorage.getItem("lc_theme") || "light");
</script>
<style>
/* ══════════ 三主题：白天（默认·科技卡通）/ 护眼 / 夜间 ══════════ */
:root, [data-theme="light"] {
  --bg: linear-gradient(160deg, #fff6ec 0%, #f2f8ff 55%, #eef4ff 100%);
  --bg-solid: #f6f9ff;
  --bg2: #ffffff;
  --panel: #ffffff;
  --panel2: #f2f6ff;
  --border: rgba(30,50,90,.08);
  --border2: rgba(30,50,90,.16);
  --text: #2b3446;
  --text2: #5b6a84;
  --text3: #98a3b8;
  --accent: #ff7d1f;
  --accent2: #f96d00;
  --accent-grad: linear-gradient(135deg, #ffa53d, #ff7d1f);
  --green: #22b573;
  --red: #ef5350;
  --blue: #3d9bff;
  --codebg: #f0f4fb;
  --hover: rgba(255,125,31,.07);
  --userbubble: linear-gradient(135deg, #e3f1ff, #d6e9ff);
  --userborder: rgba(61,155,255,.35);
  --shadow: 0 4px 18px rgba(60,90,150,.08);
  --shadow-accent: 0 6px 18px rgba(255,125,31,.30);
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
}
[data-theme="eye"] {
  --bg: linear-gradient(160deg, #eaf2dd 0%, #e4efe0 100%);
  --bg-solid: #e9f0dd;
  --bg2: #f4f8ec;
  --panel: #fbfdf6;
  --panel2: #e9f1dc;
  --border: rgba(45,70,30,.10);
  --border2: rgba(45,70,30,.20);
  --text: #2c351f;
  --text2: #55653f;
  --text3: #85916c;
  --accent: #e08a1e;
  --accent2: #c47408;
  --accent-grad: linear-gradient(135deg, #f0a53e, #e08a1e);
  --green: #3d8b56;
  --red: #c24b4b;
  --blue: #4a80b8;
  --codebg: #e8efdb;
  --hover: rgba(224,138,30,.08);
  --userbubble: linear-gradient(135deg, #dde9d0, #d2e2c2);
  --userborder: rgba(90,130,60,.30);
  --shadow: 0 4px 16px rgba(70,95,45,.10);
  --shadow-accent: 0 6px 16px rgba(224,138,30,.28);
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
}
[data-theme="dark"] {
  --bg: linear-gradient(160deg, #10131d 0%, #0d1220 100%);
  --bg-solid: #0d1220;
  --bg2: #131a2a;
  --panel: #182138;
  --panel2: #1f2a47;
  --border: rgba(255,255,255,.09);
  --border2: rgba(255,255,255,.16);
  --text: #e8ecf5;
  --text2: #a3adc4;
  --text3: #68738e;
  --accent: #ff9a4d;
  --accent2: #ffb87e;
  --accent-grad: linear-gradient(135deg, #ffab52, #ff7d1f);
  --green: #3ddc97;
  --red: #ff6b6b;
  --blue: #5aa9ff;
  --codebg: #10182b;
  --hover: rgba(255,154,77,.09);
  --userbubble: linear-gradient(135deg, #233c66, #1d3257);
  --userborder: rgba(90,169,255,.35);
  --shadow: 0 4px 18px rgba(0,0,0,.35);
  --shadow-accent: 0 6px 18px rgba(255,125,31,.35);
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg); background-attachment: fixed; color: var(--text);
  font: 14.5px/1.65 -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  overflow: hidden;
}
#app { display: flex; height: 100vh; }

/* ── 侧边栏 ── */
#sidebar {
  width: 240px; flex-shrink: 0; display: flex; flex-direction: column;
  background: var(--bg2); border-right: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: 12px; padding: 20px 16px 14px; }
img.paw {
  width: 46px; height: 46px; border-radius: 14px; object-fit: cover;
  border: 2px solid rgba(255,125,31,.4); box-shadow: var(--shadow-accent);
}
.brand .name { font-weight: 800; font-size: 16.5px; letter-spacing: .3px; }
.brand .sub { font-size: 11.5px; color: var(--text3); }
nav { padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
nav button {
  display: flex; align-items: center; gap: 11px; width: 100%;
  padding: 10px 14px; border: 0; border-radius: 14px; cursor: pointer;
  background: transparent; color: var(--text2); font-size: 14px; font-weight: 600; text-align: left;
  transition: all .15s;
}
nav button:hover { background: var(--hover); color: var(--text); transform: translateX(2px); }
nav button.active {
  background: var(--accent-grad); color: #fff;
  box-shadow: var(--shadow-accent);
}
nav button .ico { width: 22px; text-align: center; font-size: 16px; }
.side-foot {
  margin: auto 12px 14px; padding: 12px 14px; border-radius: 14px;
  background: var(--panel2); border: 1px solid var(--border);
  font-size: 12px; color: var(--text3); display: flex; flex-direction: column; gap: 7px;
}
.stat-row { display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.dot.ok { background: var(--green); box-shadow: 0 0 7px rgba(61,220,151,.7); }
.dot.err { background: var(--red); }
.stat-row .v { color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── 主区 ── */
main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#topbar {
  height: 56px; flex-shrink: 0; display: flex; align-items: center; gap: 12px;
  padding: 0 22px; border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
#crumb { font-weight: 800; font-size: 16px; }
#modelBadge {
  margin-left: auto; font-size: 12px; color: var(--text2);
  border: 1.5px solid var(--border2); border-radius: 999px; padding: 4px 14px;
  font-family: var(--mono);
}
#themeBtn {
  border: 1.5px solid var(--border2); background: var(--panel); color: var(--text2);
  border-radius: 999px; padding: 5px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
#sbToggle {
  border: 1.5px solid var(--border2); background: var(--panel); color: var(--text2);
  border-radius: 10px; width: 34px; height: 34px; font-size: 15px; cursor: pointer;
  flex-shrink: 0; transition: all .15s;
}
#sbToggle:hover { color: var(--accent2); border-color: var(--accent); }
#themeBtn:hover { color: var(--accent2); border-color: var(--accent); transform: scale(1.05); }

/* ── 小博声音开关：看得见开/关的滑动开关 ── */
.voice-toggle {
  display: flex; align-items: center; gap: 7px;
  border: 1.5px solid var(--border2); background: var(--panel); color: var(--text2);
  border-radius: 999px; padding: 4px 11px 4px 13px;
  font-size: 12.5px; font-weight: 600; cursor: pointer; user-select: none;
  transition: all .15s; line-height: 1;
}
.voice-toggle:hover { border-color: var(--accent); }
.vt-text { line-height: 1; }
.vt-state { font-size: 10.5px; font-weight: 700; opacity: .55; line-height: 1; }
.vt-switch {
  position: relative; width: 34px; height: 19px;
  background: var(--border2); border-radius: 999px; flex-shrink: 0;
  transition: background .25s;
}
.vt-knob {
  position: absolute; top: 2px; left: 2px;
  width: 15px; height: 15px; background: #fff; border-radius: 50%;
  box-shadow: 0 1px 3px rgba(0,0,0,.35);
  transition: transform .25s;
}
/* 开启态：轨道变主题橙、圆点右滑、文字提亮 */
.voice-toggle.on { color: var(--accent2); border-color: var(--accent); background: var(--hover); }
.voice-toggle.on .vt-state { color: var(--accent2); opacity: 1; }
.voice-toggle.on .vt-switch { background: var(--accent); }
.voice-toggle.on .vt-knob { transform: translateX(15px); }

/* ── 陪伴徽章（页头）：陪伴第 N 天 · 一起聊过 X token ── */
.companion-chip {
  font-size: 12px; font-weight: 600; color: var(--text2);
  border: 1.5px solid var(--border2); border-radius: 999px;
  padding: 4px 11px; background: var(--panel); white-space: nowrap;
}

/* ── Flow 卡（闯关 / 步骤树 双模式共用 DOM，class 切换） ── */
.flowcard { border: 1.5px solid var(--border2); border-radius: 14px; background: var(--panel); margin: 6px 0; overflow: hidden; }
.flowcard .fc-head { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px dashed var(--border2); font-size: 13px; font-weight: 700; }
.flowcard .fc-goal { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.flowcard .fc-mode { border: 1px solid var(--border2); background: none; color: var(--text2); border-radius: 999px; font-size: 11px; padding: 2px 9px; cursor: pointer; }
.flowcard .fc-mode:hover { border-color: var(--accent); color: var(--accent2); }
.flowcard .fc-body { padding: 10px 12px; }
.flowcard .fc-foot { padding: 8px 12px; font-size: 12.5px; color: var(--text2); border-top: 1px dashed var(--border2); }
.flowcard.fc-done .fc-foot { color: var(--accent2); font-weight: 600; }
/* 闯关模式：横向关卡格 */
.flowcard.mode-quest .fc-nodes { display: flex; gap: 6px; flex-wrap: wrap; }
.flowcard.mode-quest .fc-node { flex: 1; min-width: 90px; text-align: center; border: 1.5px solid var(--border2); border-radius: 12px; padding: 9px 6px; font-size: 12px; color: var(--text2); background: var(--bg); transition: all .25s; }
.flowcard.mode-quest .fc-node .qn-ico { font-size: 20px; display: block; margin-bottom: 3px; filter: grayscale(1); opacity: .5; }
.flowcard.mode-quest .fc-node.st-running { border-color: var(--accent); color: var(--text); box-shadow: 0 0 0 3px var(--hover); transform: translateY(-2px); }
.flowcard.mode-quest .fc-node.st-running .qn-ico { filter: none; opacity: 1; animation: bob 1s infinite alternate; }
.flowcard.mode-quest .fc-node.st-done { border-color: var(--ok, #22c55e); color: var(--text); }
.flowcard.mode-quest .fc-node.st-done .qn-ico { filter: none; opacity: 1; }
.flowcard.mode-quest .fc-node.st-inserted { border-style: dashed; border-color: #f59e0b; }
.flowcard.mode-quest .fc-tools { font-size: 11px; margin-top: 4px; opacity: .8; }
@keyframes bob { from { transform: translateY(0); } to { transform: translateY(-3px); } }
.flowcard .fc-stars { text-align: center; font-size: 15px; letter-spacing: 3px; margin-top: 8px; }
.flowcard.mode-quest .tn-st { display: none; }
.flowcard.mode-tree .qn-ico { display: none; }
.flowcard.mode-tree .qn-cell { flex: 1; }
/* 步骤树模式：竖向节点 */
.flowcard.mode-tree .fc-nodes { display: flex; flex-direction: column; gap: 0; }
.flowcard.mode-tree .fc-node { display: flex; align-items: flex-start; gap: 9px; padding: 7px 2px 7px 4px; border-left: 3px solid var(--border2); margin-left: 8px; padding-left: 12px; font-size: 13px; color: var(--text2); }
.flowcard.mode-tree .fc-node.st-running { border-left-color: var(--accent); color: var(--text); font-weight: 600; }
.flowcard.mode-tree .fc-node.st-done { border-left-color: var(--ok, #22c55e); color: var(--text); }
.flowcard.mode-tree .fc-node.st-skipped { opacity: .55; text-decoration: line-through; }
.flowcard.mode-tree .fc-node.st-inserted { border-left-style: dashed; border-left-color: #f59e0b; }
.flowcard.mode-tree .fc-node .tn-st { font-size: 12px; flex-shrink: 0; width: 18px; text-align: center; }
.flowcard.mode-tree .fc-tools { font-size: 11.5px; margin-top: 2px; opacity: .85; }
/* 技能事件卡 */
.ev-skill { border: 1.5px dashed var(--accent); border-radius: 12px; padding: 8px 12px; margin: 6px 0; font-size: 13px; background: var(--hover); }
.ev-skill .esk-act { margin-left: 8px; font-size: 11.5px; border: 1px solid var(--border2); background: var(--panel); color: var(--text2); border-radius: 999px; padding: 2px 10px; cursor: pointer; }
.ev-skill .esk-act:hover { border-color: var(--accent); color: var(--accent2); }
/* 技能图鉴页 */
.skills-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.skills-tabs { display: flex; gap: 6px; }
.skills-tabs button { border: 1.5px solid var(--border2); background: var(--panel); color: var(--text2); border-radius: 999px; padding: 5px 14px; font-size: 12.5px; cursor: pointer; }
.skills-tabs button.active { border-color: var(--accent); color: var(--accent2); font-weight: 700; }
.skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
.skill-card { border: 1.5px solid var(--border2); border-radius: 14px; background: var(--panel); padding: 13px 14px; cursor: pointer; transition: all .15s; }
.skill-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.skill-card.retired { opacity: .5; }
.skill-card .sc-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.skill-card .sc-meta { font-size: 11.5px; color: var(--text2); display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 7px; }
.skill-card .sc-src { border: 1px solid var(--border2); border-radius: 999px; padding: 0 7px; font-size: 10.5px; }
.skill-card .sc-note { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
.skill-card .sc-bar { height: 6px; border-radius: 999px; background: var(--border2); overflow: hidden; }
.skill-card .sc-bar i { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
.skill-card .sc-foot { font-size: 11px; color: var(--text2); margin-top: 5px; display: flex; justify-content: space-between; }
.skill-drawer-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 90; }
.skill-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(480px, 92vw); background: var(--bg); border-left: 1.5px solid var(--border2); z-index: 91; overflow-y: auto; padding: 18px; }
.skill-drawer h3 { margin: 0 0 4px; }
.skill-drawer .sd-sec { margin-top: 14px; }
.skill-drawer .sd-sec h4 { font-size: 13px; margin: 0 0 6px; color: var(--accent2); }
.skill-drawer .sd-body { font-size: 13px; line-height: 1.7; border: 1px solid var(--border2); border-radius: 10px; padding: 10px 12px; background: var(--panel); }
.skill-drawer .sd-log { font-size: 12px; color: var(--text2); line-height: 1.8; }
.skill-drawer .sd-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.view { flex: 1; overflow-y: auto; min-height: 0; }
.hidden { display: none !important; }

/* ── 对话视图 ── */
#view-chat { display: flex; overflow: hidden; }
#convList {
  width: 220px; flex-shrink: 0; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; background: var(--bg2);
}
#convList .hd { padding: 14px 12px; }
#convList .items { flex: 1; overflow-y: auto; padding: 0 10px 12px; }
.conv-item {
  padding: 9px 12px; border-radius: 12px; cursor: pointer; margin-bottom: 3px;
  color: var(--text2); font-size: 13px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: all .12s;
}
.conv-item:hover { background: var(--hover); }
.conv-item.active { background: var(--panel2); color: var(--accent2); }
.conv-item .t { font-size: 11px; color: var(--text3); font-weight: 400; }
#chatCol { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#subjectBar {
  display: flex; gap: 9px; align-items: center; padding: 12px 22px;
  border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
  background: var(--bg2);
}
.chip {
  border: 2px solid var(--border2); background: var(--panel); color: var(--text2);
  border-radius: 999px; padding: 5px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all .15s;
}
.chip:hover { transform: translateY(-1px) scale(1.03); box-shadow: var(--shadow); }
.chip.active[data-sub="general"] { background: linear-gradient(135deg,#ffa53d,#ff7d1f); border-color: transparent; color: #fff; }
.chip.active[data-sub="math"]    { background: linear-gradient(135deg,#5eb2ff,#3d9bff); border-color: transparent; color: #fff; }
.chip.active[data-sub="chinese"] { background: linear-gradient(135deg,#ff8fb3,#ff6b9d); border-color: transparent; color: #fff; }
.chip.active[data-sub="science"] { background: linear-gradient(135deg,#4ed48a,#22b573); border-color: transparent; color: #fff; }
.chip.active[data-sub="english"] { background: linear-gradient(135deg,#b18cfe,#9b5cff); border-color: transparent; color: #fff; }
#msgs { flex: 1; overflow-y: auto; padding: 26px 0 14px; }
.msg { display: flex; gap: 12px; padding: 6px 30px; max-width: 920px; margin: 0 auto 16px; }
.msg .avatar {
  width: 40px; height: 40px; border-radius: 13px; flex-shrink: 0;
  display: grid; place-items: center; font-size: 18px; margin-top: 2px;
  background: var(--panel); border: 1.5px solid var(--border2);
  box-shadow: var(--shadow); overflow: hidden;
}
.msg .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.msg.user .avatar { background: var(--userbubble); border-color: var(--userborder); }
.msg .bubble { min-width: 0; flex: 1; position: relative; }
.msg .who { font-size: 12px; font-weight: 700; color: var(--text3); margin-bottom: 4px; }
.msg .body {
  background: var(--panel); border: 1.5px solid var(--border); border-radius: 4px 20px 20px 20px;
  padding: 12px 16px; font-size: 14.5px; word-break: break-word;
  box-shadow: var(--shadow);
}
.msg.user .body {
  background: var(--userbubble); border-color: var(--userborder);
  border-radius: 20px 4px 20px 20px;
}
.msg .body.streaming { border-color: var(--accent); }
.cursor::after { content: "▍"; color: var(--accent); animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* 欢迎页 */
#welcome { text-align: center; padding: 46px 24px 20px; color: var(--text3); }
#welcome img {
  width: 110px; height: 110px; border-radius: 28px; object-fit: cover;
  border: 3px solid rgba(255,125,31,.45); box-shadow: var(--shadow-accent);
  margin-bottom: 16px; animation: float 3s ease-in-out infinite;
}
@keyframes float { 50% { transform: translateY(-8px); } }
#welcome h2 { color: var(--text); font-weight: 800; font-size: 22px; margin-bottom: 8px; }
#welcome p { color: var(--text2); }
.sugg { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 26px; }
.sugg button {
  border: 2px solid var(--border2); background: var(--panel); color: var(--text2);
  border-radius: 18px; padding: 12px 18px; font-size: 13.5px; font-weight: 600;
  cursor: pointer; transition: all .15s; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 8px;
}
.sugg button:hover {
  border-color: var(--accent); color: var(--accent2);
  transform: translateY(-3px); box-shadow: var(--shadow-accent);
}
.sugg .e { font-size: 18px; }

/* 输入区 */
#inputDock { flex-shrink: 0; padding: 12px 30px 18px; }
#inputBox {
  max-width: 920px; margin: 0 auto; display: flex; flex-wrap: nowrap;
  gap: 8px; align-items: center;
  background: var(--panel); border: 2px solid var(--border2); border-radius: 22px;
  padding: 8px 10px; box-shadow: var(--shadow);
  transition: border-color .15s;
}
#inputBox:focus-within { border-color: var(--accent); box-shadow: var(--shadow-accent); }
#inp {
  flex: 1; background: transparent; border: 0; outline: 0; resize: none;
  color: var(--text); font: inherit; line-height: 1.5;
  min-height: 38px; max-height: 140px; padding: 9px 4px; box-sizing: border-box;
}
/* 输入区三件套：📷 🎤 ➤ 统一圆形规格，视觉成一套 */
#photoBtn, #micBtn {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  background: var(--panel2); border: 1.5px solid var(--border2);
  color: var(--text2); font-size: 16px; cursor: pointer; padding: 0;
  display: grid; place-items: center;
  transition: transform .14s, border-color .14s, background .14s, color .14s;
}
#photoBtn:hover, #micBtn:hover {
  transform: translateY(-1px); border-color: var(--accent);
  color: var(--accent); background: var(--hover);
}
#micBtn.recording {
  background: var(--accent-grad); border-color: transparent; color: #fff;
  animation: micPulse 1.2s ease-in-out infinite;
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,125,31,.45); }
  50% { box-shadow: 0 0 0 7px rgba(255,125,31,0); }
}
#sendBtn {
  width: 40px; height: 40px; border-radius: 50%; border: 0; cursor: pointer;
  background: var(--accent-grad); color: #fff; font-size: 16px;
  display: grid; place-items: center; flex-shrink: 0;
  box-shadow: var(--shadow-accent); transition: transform .12s, opacity .12s;
}

/* markdown */

/* 模型卡片选择器 */
.model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
.model-card {
  position: relative; border: 2px solid var(--border2); border-radius: 16px;

}
.model-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.model-card .mc-name { font-weight: 800; font-size: 14px; margin-top: 6px; color: var(--text); }

.model-card .mc-check {

}
.model-card.active .mc-check { display: flex; }
.model-card .mc-check:empty::after { content: "✓"; }
/* 聊天事件卡片：工具调用/知识引用/学科切换 */
.evbox { display: flex; flex-direction: column; gap: 6px; margin: 2px 0 6px; }
.evbox:empty { display: none; }
.ev-tool {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  background: var(--panel2); border: 1.5px dashed var(--border2);

}
.ev-tool .et-name { font-weight: 800; color: var(--accent2); }
.ev-tool .et-io { font-family: var(--mono); font-size: 12px; word-break: break-all; }
.ev-tool .et-io b { color: var(--text); }
.ev-tool.et-fail .et-name { color: var(--red); }
.ev-wiki {

}

}
.ev-letter {

}
[data-theme="night"] .ev-letter, [data-theme="eye"] .ev-letter { color: #e8a94c; background: rgba(245,207,138,.12); border-color: rgba(245,207,138,.35); }
.quiz-btn { margin-top: 8px; }
/* 专属题卡 */
.quiz-wrap { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
.quiz-q { background: var(--panel2); border: 1.5px solid var(--border); border-radius: 14px; padding: 10px 12px; }
.quiz-q .qq-t { font-size: 13.5px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.quiz-q .qq-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.quiz-opt {
  border: 1.5px solid var(--border2); border-radius: 10px; padding: 7px 10px;
  font-size: 13px; color: var(--text); background: var(--panel); cursor: pointer;
  text-align: left; transition: all .12s;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); }
.quiz-opt:disabled { cursor: default; opacity: .85; }
.quiz-opt.hit { border-color: var(--green); background: rgba(34,181,115,.12); font-weight: 700; }
.quiz-opt.miss { border-color: var(--red); background: rgba(239,83,80,.12); }
.quiz-q .qq-explain { font-size: 12px; color: var(--text2); margin-top: 8px; border-top: 1.5px dashed var(--border); padding-top: 6px; }
.quiz-result { font-size: 13px; font-weight: 800; color: var(--accent2); text-align: center; padding: 4px; }
.empty { color: var(--text3); font-size: 12.5px; padding: 6px 0; }
input[type=text], textarea, select {
  width: 100%; background: var(--bg2); border: 2px solid var(--border2); border-radius: 12px;
  color: var(--text); padding: 9px 14px; font: inherit; font-size: 13.5px; outline: none;
  transition: border-color .15s;
}
input[type=text]:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 90px; }
label.f { display: block; font-size: 12.5px; font-weight: 700; color: var(--text2); margin: 12px 0 5px; }
.btn {
  background: var(--accent-grad); color: #fff; border: 0; border-radius: 999px;
  padding: 9px 22px; font-size: 13.5px; font-weight: 700; cursor: pointer; margin-top: 14px;
  box-shadow: var(--shadow-accent); transition: transform .12s;
}
.btn:hover { transform: translateY(-1px) scale(1.03); }
.btn.ghost { background: var(--panel); border: 2px solid var(--border2); color: var(--text2); box-shadow: none; }
.btn.small { padding: 5px 14px; margin-top: 0; font-size: 12px; }
.btn.danger { background: transparent; border: 2px solid rgba(239,83,80,.45); color: var(--red); box-shadow: none; }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.wiki-item { display: flex; flex-direction: column; gap: 5px; }
.wiki-item .hd { display: flex; align-items: center; justify-content: space-between; }
.wiki-item .title { font-weight: 700; }
.wiki-item .src { font-size: 11.5px; color: var(--text3); }
.wiki-item .snippet { font-size: 13px; color: var(--text2); }
.tag { font-size: 11px; border: 1.5px solid var(--border2); border-radius: 999px; padding: 1px 9px; color: var(--text3); font-weight: 600; }
.job-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-top: 1.5px dashed var(--border); font-size: 13.5px; }
.job-row:first-of-type { border-top: 0; }
.job-row .nm { flex: 1; min-width: 0; }
.job-row .cron { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.pill { font-size: 11px; font-weight: 700; border-radius: 999px; padding: 2px 11px; border: 1.5px solid var(--border2); color: var(--text2); }
.pill.on { border-color: rgba(34,181,115,.5); color: var(--green); }
.pill.off { color: var(--text3); }
.toast {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  background: var(--panel); border: 2px solid var(--accent); border-radius: 999px;
  padding: 10px 22px; font-size: 13.5px; font-weight: 700; color: var(--accent2); z-index: 99;
  box-shadow: var(--shadow-accent);
}
/* 角色选择卡片 */
.profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.profile-card {
  cursor: pointer; border: 2px solid var(--border2); border-radius: 16px;
  padding: 16px 8px; text-align: center; background: var(--panel2);
  transition: transform .14s, border-color .14s, box-shadow .14s;
}
.profile-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow-accent); }
.profile-card.active { border-color: var(--accent); background: var(--hover); }
.profile-card .pe { font-size: 32px; }
.profile-card .pn { font-size: 14px; font-weight: 700; margin-top: 6px; color: var(--text); }
#profileBtn { font-size: 16px; }
/* 顶栏身份胶囊：圆头像 + 名字（2026-07-23 哥哥嫌方形框丑重设计） */
.profile-chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 3px 12px 3px 3px; border-radius: 999px;
  background: linear-gradient(135deg, #e0f2fe, #ede9fe);

  box-shadow: 0 2px 8px rgba(56,189,248,.25);

}

.profile-chip .pc-avatar {

}

/* 首次见面弹窗 */
#onboard {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(20,28,45,.45); backdrop-filter: blur(6px);
  display: grid; place-items: center;
}
.ob-card {
  width: 380px; max-width: 92vw; text-align: center;

  animation: pop .3s cubic-bezier(.2,1.4,.4,1);
}
@keyframes pop { from { transform: scale(.8); opacity: 0; } }
.ob-card img {
  width: 96px; height: 96px; border-radius: 24px; object-fit: cover;
  border: 3px solid rgba(255,125,31,.45); box-shadow: var(--shadow-accent);

}
.ob-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.ob-card p { color: var(--text2); font-size: 14px; margin-bottom: 16px; }
.ob-card input, .ob-card select { text-align: center; font-size: 15px; padding: 11px 14px; margin-bottom: 10px; }
.ob-card .btn { width: 100%; margin-top: 6px; padding: 12px; font-size: 15px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── 两栏折叠（左侧栏 + 会话列表，收起来只剩对话框）── */
body.hide-sidebar #sidebar { display: none; }
body.hide-convlist #convList { display: none; }
#view-chat { position: relative; }
#clFab {
  position: absolute; left: 10px; top: 10px; z-index: 20;
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--panel); border: 1.5px solid var(--border2);
  cursor: pointer; font-size: 15px; box-shadow: 0 2px 8px rgba(0,0,0,.1);
}

/* 收起对话列表时 clFab 浮在左上，给「找小伙伴」让位避免重叠 */

/* ── 内容守护弹窗：卡通温暖，不用"违规/违禁"字眼 ── */
#modModal { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none;
  align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
#modModal.show { display: flex; }
.mod-card { background: var(--bg); border-radius: 22px; padding: 30px 26px 22px;
  max-width: 360px; width: 100%; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,.25);
  animation: modPop .25s ease; }
@keyframes modPop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.mod-card .mod-em { font-size: 46px; line-height: 1; }
.mod-card .mod-title { font-size: 17px; font-weight: 800; margin: 10px 0 6px; color: var(--text); }
.mod-card .mod-desc { font-size: 13.5px; color: var(--text2); line-height: 1.65; }
.mod-card .mod-hot { margin: 14px 0 6px; padding: 12px 10px; background: var(--panel2);
  border-radius: 14px; font-size: 12.5px; color: var(--text2); }
.mod-card .mod-hot b { display: block; font-size: 22px; color: var(--accent2); margin: 4px 0; letter-spacing: 1px; }

.mod-warm .mod-title { color: #e8833a; }

/* ── Agent 工作过程条：让"小博在干活"全程可见 ── */
.stage {
  display: flex; align-items: center; gap: 7px; width: fit-content;
  font-size: 12.5px; font-weight: 600; color: var(--accent2);
  background: var(--panel2); border: 1.5px solid var(--border2);
  border-radius: 999px; padding: 5px 13px; margin: 2px 0 6px;
}
.stage .st-ico { animation: stPulse 1.1s ease-in-out infinite; display: inline-block; }
@keyframes stPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: .75; } }
.stage .dots::after { content: ""; animation: stDots 1.2s steps(4) infinite; }
@keyframes stDots { 0% { content: ""; } 25% { content: "·"; } 50% { content: "··"; } 75% { content: "···"; } }
.stage.done { color: var(--text3); border-style: dashed; font-weight: 500; }
.stage.done .st-ico { animation: none; }

/* 身份卡片（顶栏👤点开） */
.id-who { display: flex; align-items: center; gap: 12px; margin: 6px 0 14px; }

</style>

<script>
"use strict";
/* ───────── 主题 ───────── */
const THEME_CYCLE = [["light", "🌞 白天"], ["eye", "🍃 护眼"], ["dark", "🌙 夜间"]];
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("lc_theme", t);
  const [, label] = THEME_CYCLE.find(([k]) => k === t) || THEME_CYCLE[0];
  document.getElementById("themeBtn").textContent = label;
}
document.getElementById("themeBtn").addEventListener("click", () => {
  const cur = localStorage.getItem("lc_theme") || "light";
  const i = THEME_CYCLE.findIndex(([k]) => k === cur);
  applyTheme(THEME_CYCLE[(i + 1) % THEME_CYCLE.length][0]);
});
applyTheme(localStorage.getItem("lc_theme") || "light");

/* ───────── 工具 ───────── */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function md(src) {
  // 轻量 markdown：代码块/行内代码/粗斜体/标题/列表/表格/链接
  let t = esc(src);
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, (m, l, c) => `<pre><code>${c.trim()}</code></pre>`);
  t = t.replace(/`([^`\n]+)`/g, "<code>$1</code>");
  t = t.replace(/^######\s?(.*)$/gm, "<h3>$1</h3>").replace(/^###\s?(.*)$/gm, "<h3>$1</h3>")
       .replace(/^##\s?(.*)$/gm, "<h2>$1</h2>").replace(/^#\s?(.*)$/gm, "<h1>$1</h1>");
  t = t.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, "<em>$1</em>");
  t = t.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--blue)">$1</a>');
  // 表格
  t = t.replace(/((?:^\|.*\|\s*$\n?)+)/gm, block => {
    const rows = block.trim().split("\n").filter(r => !/^\|[\s:|-]+\|$/.test(r.trim()));
    if (!rows.length) return block;
    const cells = r => r.trim().replace(/^\||\|$/g, "").split("|").map(c => c.trim());
    let h = "<table>", first = true;
    for (const r of rows) {
      const tag = first ? "th" : "td";
      h += "<tr>" + cells(r).map(c => `<${tag}>${c}</${tag}>`).join("") + "</tr>";
      first = false;
    }
    return h + "</table>";
  });
  // 列表
  t = t.replace(/((?:^[ \t]*(?:[-*+]|\d+\.)\s+.*\n?)+)/gm, block => {
    const ordered = /^\s*\d+\./.test(block);
    const items = block.trim().split("\n").map(l => `<li>${l.replace(/^[ \t]*(?:[-*+]|\d+\.)\s+/, "")}</li>`).join("");
    return ordered ? `<ol>${items}</ol>` : `<ul>${items}</ul>`;
  });
  t = t.split(/\n{2,}/).map(p => /^\s*<(h\d|ul|ol|pre|table)/.test(p) ? p : `<p>${p.replace(/\n/g, "<br>")}</p>`).join("");
  return t;
}

async function api(path, opts = {}) {
  if (curUid) { path += (path.includes("?") ? "&" : "?") + "uid=" + encodeURIComponent(curUid); }
  const r = await fetch(path, opts.method ? {
    method: opts.method,
    headers: {"Content-Type": "application/json"},
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  } : undefined);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) { const e = new Error(data.error || data.hint || `HTTP ${r.status}`); e.status = r.status; throw e; }
  return data;
}
function toast(msg, ms = 2200) {
  const d = document.createElement("div");
  d.className = "toast"; d.textContent = msg; document.body.appendChild(d);
  setTimeout(() => d.remove(), ms);
}

/* ───────── 导航 ───────── */

let currentTab = "chat";
const loaders = { memory: loadMemory, wiki: loadWiki, jobs: loadJobs, skills: loadSkills, settings: loadSettings };

        ${c ? `<span class="companion-chip">🐾 陪伴第 ${c.days} 天 · 一起聊过 ${c.total_tokens >= 10000 ? (c.total_tokens / 10000).toFixed(1) + " 万" : c.total_tokens} token</span>` : ""}
        <div class="skills-tabs">${tabs.map(([k, n]) => `<button data-skfilter="${k}" class="${skillsFilter === k ? "active" : ""}">${n}</button>`).join("")}</div>

function skillCardHtml(s) {

async function openSkillDrawer(slug) {

  };
  if (mask.querySelector("#sdClone")) mask.querySelector("#sdClone").onclick = async () => {

    else { toast("失败" + (r && r.error ? "：" + r.error : "")); }

       <button class="btn small" id="sdSave">💾 保存</button>`;
    mask.querySelector("#sdSave").onclick = async () => {
      await post(`api/skills/${s.slug}/update`, { title: mask.querySelector("#sdTitle").value, body: mask.querySelector("#sdBody").value });
      close(); loadSkills(); toast("已保存 ✓");
    };
  };
}
function openSkillNew() {

    <div class="sd-sec"><h4>本领内容（Markdown）</h4><textarea id="snBody" style="width:100%;min-height:220px" placeholder="# 什么时候用&#10;……&#10;# 怎么做&#10;1. ……"></textarea></div>

const BOT_AVATAR = '<img src="static/avatar.png" alt="超级小博">';
const TOOL_META = {
  calculator: ["🧮", "计算器"], dictionary: ["📖", "字典"], knowledge: ["📚", "知识库"],
  timer: ["⏱️", "计时器"], mistake_book: ["📒", "错题本"], word_bank: ["📝", "生词本"],
};
const SUBJECT_NAMES = { math: "数学问伴", chinese: "语文问伴", english: "英语问伴", science: "科学问伴", general: "万能问伴" };
function evHtml(ev) {
  if (ev.type === "tool") {
    const [ico, nm] = TOOL_META[ev.name] || ["🔧", ev.name];
    const io = ev.input
      ? esc(ev.input) + (ev.output ? " → <b>" + esc(ev.output) + "</b>" : "")
      : esc(ev.output || "");
    return `<div class="ev-tool${ev.success === false ? " et-fail" : ""}"><span>${ico}</span><span class="et-name">${esc(nm)}</span><span class="et-io">${io}</span></div>`;
  }
  if (ev.type === "wiki") {
    return `<div class="ev-wiki">📚 参考了知识库 ${ev.pages.map(p => "《" + esc(p) + "》").join(" ")}</div>`;
  }
  if (ev.type === "route") {
    const nm = SUBJECT_NAMES[ev.to] || ev.to;
    return `<div class="ev-route">${ev.changed === false ? "🎯 " + esc(nm) + "在线陪伴" : "🔀 " + esc(nm) + "接棒啦"}</div>`;
  }
  if (ev.type === "letter") {
    return `<div class="ev-letter">${ev.kind === "birthday" ? "🎂 超级小博记得今天！" : "💌 超级小博主动来信"}</div>`;
  }
  if (ev.type === "skill_saved") {
    return `<div class="ev-skill">💾 小博学会了新本领「${esc(ev.title)}」${ev.slug ? `<button class="esk-act" data-skill-view="${esc(ev.slug)}">查看</button><button class="esk-act" data-skill-undo="${esc(ev.slug)}">撤销</button>` : ""}</div>`;
  }
  if (ev.type === "skill_used") {
    return `<div class="ev-skill">🎯 复用了本领「${esc(ev.title)}」</div>`;
  }
  if (ev.type === "skill_evolved") {
    return `<div class="ev-skill">✨ 本领「${esc(ev.title)}」被打磨得更顺手了</div>`;
  }
  if (ev.type === "companion_milestone") {
    const txt = ev.kind === "days" ? `小博陪伴你第 ${ev.value} 天啦` : `你们一起聊过 ${ev.value >= 10000 ? (ev.value / 10000) + " 万" : ev.value} token 啦`;
    return `<div class="ev-skill">🎉 ${txt}！</div>`;
  }
  return "";
}

/* ── Flow 卡：闯关 / 步骤树 双模式（同一 DOM，CSS class 切换） ── */
const FLOW_TYPES = ["plan", "step", "tool_round", "replanned", "flow_done"];
let flowMode = localStorage.getItem("lc_flow_mode") || "quest";
const NODE_ICO = { pending: "🔒", running: "⚔️", done: "✅", skipped: "⏭️", failed: "❌", inserted: "🌱" };
function flowFromEvents(events) {
  let f = null;
  for (const ev of events || []) {
    if (ev.type === "plan") {
      f = { goal: ev.goal || "", done: false, summary: "", rate: 0,
            nodes: (ev.nodes || []).map(n => ({ id: n.node_id ?? n.id, title: n.title, status: n.status || "pending", tools: [] })) };
    } else if (!f) { continue; }
    else if (ev.type === "step") {
      const n = f.nodes.find(x => x.id === ev.node_id);
      if (n) n.status = ev.status;
    } else if (ev.type === "tool_round") {
      const n = f.nodes.find(x => x.id === ev.node_id);
      if (n) n.tools.push(ev);
    } else if (ev.type === "replanned") {
      if (ev.node) {
        const idx = f.nodes.findIndex(x => x.status === "running");
        f.nodes.splice(idx >= 0 ? idx + 1 : f.nodes.length, 0,
          { id: ev.node.id ?? ev.node.node_id, title: ev.node.title, status: "inserted", tools: [] });
      }
    } else if (ev.type === "flow_done") {
      f.done = true; f.summary = ev.summary || ""; f.rate = ev.completion_rate || 0;
    }
  }
  return f;
}
function flowCardHtml(f) {
  if (!f) return "";
  const nodes = f.nodes.map(n => {
    const ico = NODE_ICO[n.status] || "▫️";
    // 同工具同轮合并（模型一轮可能并行调多次同工具，逐条列会刷屏）
    const grouped = {};
    (n.tools || []).forEach(t => {
      const k = t.tool + "|" + t.round + "|" + (t.success === false ? "F" : "T");
      grouped[k] = grouped[k] || { ...t, count: 0 };
      grouped[k].count++;
    });
    const tools = Object.values(grouped).map(t => {
      const [tico, nm] = TOOL_META[t.tool] || ["🔧", t.tool];
      const times = t.count > 1 ? ` ×${t.count}` : "";
      return `<div class="fc-tools">${tico} ${esc(nm)}·第${t.round}轮${times} ${t.success === false ? "失败" : "✓"}</div>`;
    }).join("");
    return `<div class="fc-node st-${n.status}"><span class="tn-st">${ico}</span><span class="qn-ico">${ico}</span><div class="qn-cell"><div class="qn-title">${esc(n.title)}</div>${tools}</div></div>`;
  }).join("");
  const stars = f.nodes.map(n => (n.status === "done" || n.status === "skipped") ? "⭐" : "☆").join("");
  return `<div class="flowcard mode-${flowMode}${f.done ? " fc-done" : ""}">
    <div class="fc-head"><span>🗺️</span><span class="fc-goal">${esc(f.goal)}</span><button class="fc-mode" onclick="toggleFlowMode()">${flowMode === "quest" ? "🌳 步骤树" : "🗺️ 闯关"}</button></div>
    <div class="fc-body"><div class="fc-nodes">${nodes}</div><div class="fc-stars">${stars}</div></div>
    ${f.done ? `<div class="fc-foot">🎉 ${esc(f.summary)}${f.rate ? `（完成率 ${Math.round(f.rate * 100)}%）` : ""}</div>` : ""}
  </div>`;
}
function toggleFlowMode() {
  flowMode = flowMode === "quest" ? "tree" : "quest";
  localStorage.setItem("lc_flow_mode", flowMode);
  document.querySelectorAll(".flowcard").forEach(c => {
    c.classList.toggle("mode-quest", flowMode === "quest");
    c.classList.toggle("mode-tree", flowMode === "tree");
  });
  document.querySelectorAll(".fc-mode").forEach(b => b.textContent = flowMode === "quest" ? "🌳 步骤树" : "🗺️ 闯关");
}
function msgEl(m) {
  const div = document.createElement("div");
  div.className = "msg " + (m.role === "user" ? "user" : "bot");
  const who = m.role === "user" ? (studentName || "你") : "超级小博";
  const av = m.role === "user"
    ? '<img src="static/student.png" alt="" onerror="this.outerHTML=\'🧒\'">' : BOT_AVATAR;
  const flow = m.flow || flowFromEvents(m.events);
  const nonFlowEvents = (m.events || []).filter(e => !FLOW_TYPES.includes(e.type));
  div.innerHTML = `<div class="avatar">${av}</div>
    <div class="bubble"><div class="who">${who}</div>
    ${m.proc ? `<div class="stage done"><span class="st-ico">⚡</span><span class="st-txt">${esc(m.proc)}</span><span class="dots"></span></div>` : ""}
    ${flow ? flowCardHtml(flow) : ""}
    <div class="evbox">${nonFlowEvents.map(evHtml).join("")}</div>
    <div class="body">${m.image ? `<img class="msg-img" src="${m.image}">` : ""}${m.role === "user" ? esc(m.text).replace(/\n/g, "<br>") : md(m.text)}</div>
    ${m.action && m.action.mistake_ids && m.action.mistake_ids.length
      ? `<button class="btn small quiz-btn" data-mids="${m.action.mistake_ids.join(",")}">📝 给我出题挑战</button>` : ""}
    ${m.quiz ? `<div class="quiz-wrap" data-qz="${m.quiz.id}"></div>` : ""}
    </div>`;
  if (m.quiz) renderQuiz(div.querySelector(".quiz-wrap"), m);
  if (m.role !== "user" && m.text) {
    const tb = document.createElement("button");
    tb.className = "tts-btn"; tb.textContent = "🔊"; tb.title = "听超级小博说";
    tb.onclick = () => playTTS(m.text, tb);
    div.querySelector(".bubble").appendChild(tb);
  }
  return div;
}

let curAudio = null, curTtsBtn = null;
function playTTS(text, btn) {
  if (curAudio) { curAudio.pause(); if (curTtsBtn) curTtsBtn.textContent = "🔊"; }
  if (curTtsBtn === btn && curAudio) { curAudio = null; curTtsBtn = null; return; }
  const setBtn = s => { if (btn) btn.textContent = s; };   // btn 可空（自动朗读时无按钮）
  const a = new Audio("api/tts?text=" + encodeURIComponent(text.slice(0, 300)));
  curAudio = a; curTtsBtn = btn; setBtn("⏸");
  a.onended = () => { setBtn("🔊"); curAudio = null; curTtsBtn = null; };
  a.onerror = () => { setBtn("🔊"); if (btn) toast("语音生成失败"); curAudio = null; curTtsBtn = null; };
  a.play().catch(() => { setBtn("🔊"); });
}

async function renderQuiz(wrap, m) {
  try {
    const qz = await api("api/quiz/" + m.quiz.id);
    wrap.innerHTML = qz.questions.map((q, i) => {
      const ans = m.quiz.answers[i];
      return `<div class="quiz-q"><div class="qq-t">第 ${i + 1} 题：${esc(q.q)}</div>
        <div class="qq-opts">${Object.entries(q.options).map(([k, v]) => {
          let cls = "quiz-opt";
          if (ans) { if (k === ans.answer) cls += " hit"; else if (k === ans.choice) cls += " miss"; }
          return `<button class="${cls}" data-q="${i}" data-c="${k}" ${ans ? "disabled" : ""}>${k}. ${esc(v)}</button>`;
        }).join("")}</div>
        ${ans ? `<div class="qq-explain">${ans.correct ? "✅ 答对啦！" : "❌ 正确答案是 " + esc(ans.answer) + "。"}${esc(ans.explain)}</div>` : ""}
      </div>`;
    }).join("") + (m.quiz.score !== undefined
      ? `<div class="quiz-result">${m.quiz.score.passed ? "🎉 全对！相关错题已标记为掌握，太牛了！" : `得分 ${m.quiz.score.hit}/${m.quiz.score.total}，错的题再想想，你可以的！`}</div>` : "");
    wrap.querySelectorAll(".quiz-opt:not(:disabled)").forEach(b => b.onclick = () => answerQuiz(wrap, m, +b.dataset.q, b.dataset.c));
  } catch (e) { wrap.innerHTML = `<div class="empty">题卡加载失败：${esc(e.message)}</div>`; }
}
async function answerQuiz(wrap, m, qi, choice) {
  try {
    const r = await api("api/quiz/answer", { method: "POST", body: { quiz_id: m.quiz.id, q_index: qi, choice } });
    m.quiz.answers[qi] = { choice, correct: r.correct, answer: r.answer, explain: r.explain };
    if (r.finished) {
      const hit = Object.values(m.quiz.answers).filter(a => a.correct).length;
      m.quiz.score = { hit, total: Object.keys(m.quiz.answers).length, passed: r.passed };
    }
    const list = getMsgs(); const sm = list.find(x => x.quiz && x.quiz.id === m.quiz.id);
    if (sm) { sm.quiz = m.quiz; saveMsgs(list); }
    renderMsgs();
    if (r.finished && r.passed) toast("🎉 全对！错题已消 ✅");
  } catch (e) { toast("判分失败：" + e.message); }
}
async function startQuizFor(mids) {

  toast("超级小博正在翻你的错题本出题… ⏳");
  try {

    const list = getMsgs();
    list.push({ role: "bot", text: "来啦！这几道题是照着你的错题出的，看看是不是真掌握了：",
      events: [{ type: "letter", kind: "quiz" }], quiz: { id: r.quiz_id, answers: {} } });
    saveMsgs(list); renderMsgs();
  } catch (e) { toast("出题失败：" + e.message); }
}

      <div class="sugg">

$("#msgs").addEventListener("click", e => {
  const b = e.target.closest(".sugg button"); if (!b) return;
  $("#inp").value = b.dataset.q; send();
});

async function send() {
  const inp = $("#inp"), text = inp.value.trim();
  if ((!text && !pendingImage) || sending) return;
  if (pendingImage) return sendPhoto(text);
  sending = true; $("#sendBtn").disabled = true;
  inp.value = ""; inp.style.height = "auto";

  const list = getMsgs();
  list.push({ role: "user", text });
  const botMsg = { role: "bot", text: "", events: [] };
  list.push(botMsg);
  saveMsgs(list); renderMsgs();

  const c = curConv();
  if (c && c.title === "新对话") { c.title = text.slice(0, 18); saveConvs(); renderConvList(); }

  const box = $("#msgs");
  const lastMsg = box.lastElementChild;
  const bubble = lastMsg.querySelector(".body");
  const evbox = lastMsg.querySelector(".evbox");
  bubble.classList.add("streaming", "cursor");

  // ── Agent 工作过程条：实时亮出小博在干什么 ──
  const t0 = Date.now();
  const procChain = [];                       // 最终摘要链（数学问伴 · 计算器 …）
  const stageEl = document.createElement("div");
  stageEl.className = "stage";
  stageEl.innerHTML = `<span class="st-ico">🧠</span><span class="st-txt">超级小博思考中</span><span class="dots"></span>`;
  evbox.parentNode.insertBefore(stageEl, evbox);
  const setStage = (ico, txt, chainLabel) => {
    stageEl.querySelector(".st-ico").textContent = ico;
    stageEl.querySelector(".st-txt").textContent = txt;
    if (chainLabel && procChain[procChain.length - 1] !== chainLabel) procChain.push(chainLabel);
  };
  box.scrollTop = box.scrollHeight;

  const url = "api/chat/stream?session_id=" + encodeURIComponent(sid) + "&message=" + encodeURIComponent(text) + (curUid ? "&uid=" + encodeURIComponent(curUid) : "");
  const es = new EventSource(url);
  es.onmessage = ev => {
    if (ev.data === "[DONE]") { finish(); return; }
    try {
      const d = JSON.parse(ev.data);
      if (d.type === "moderation") {
        botMsg.events.push(d);
        showModeration(d);
        if (d.category === "mental") setStage("💛", "正在认真陪你", "认真陪");
      } else if (FLOW_TYPES.includes(d.type)) {
        // Flow 事件：重建 flow 对象并重渲卡片（闯关/步骤树）
        botMsg.events.push(d);
        botMsg.flow = flowFromEvents(botMsg.events);
        let fc = evbox.querySelector(".flowcard");
        if (fc) fc.outerHTML = flowCardHtml(botMsg.flow);
        else evbox.insertAdjacentHTML("afterbegin", flowCardHtml(botMsg.flow));
        if (d.type === "plan") setStage("🗺️", "规划冒险路线", "做计划");
        else if (d.type === "step") setStage("⚔️", "闯关：" + (d.note || "下一步"), "闯关");
        else if (d.type === "tool_round") {
          const [ico, nm] = TOOL_META[d.tool] || ["🔧", d.tool];
          setStage(ico, `用${nm}处理（第${d.round}轮）`, nm);
        } else if (d.type === "replanned") setStage("🌱", "调整路线：补一下基础", "调整路线");
        else if (d.type === "flow_done") setStage("🎉", "冒险完成！", "完成冒险");
      } else if (d.type === "skill_saved" || d.type === "skill_used" || d.type === "skill_evolved" || d.type === "companion_milestone") {
        botMsg.events.push(d);
        evbox.insertAdjacentHTML("beforeend", evHtml(d));
        if (d.type === "skill_saved") setStage("💾", "学会了新本领", "新本领");
        if (d.type === "companion_milestone") refreshStatus();
      } else if (d.type === "tool" || d.type === "wiki" || d.type === "route") {
        botMsg.events.push(d);
        evbox.insertAdjacentHTML("beforeend", evHtml(d));
        if (d.type === "route") {
          const nm = SUBJECT_NAMES[d.to] || d.to;
          setStage(d.changed === false ? "🎯" : "🔀", nm + (d.changed === false ? "在线·思考中" : "接棒·思考中"), nm);
        } else if (d.type === "tool") {
          const [ico, nm] = TOOL_META[d.name] || ["🔧", d.name];
          setStage(ico, "用" + nm + "处理", nm);
        } else if (d.type === "wiki") {
          setStage("📚", "翻知识库找资料", "知识库");
        }
      } else {
        if (!botMsg.text) setStage("✍️", "正在回答", "组织回答");
        botMsg.text += d.text || d.delta || "";
        bubble.innerHTML = md(botMsg.text);
      }
      box.scrollTop = box.scrollHeight;
    } catch (e) {}
  };
  es.onerror = () => {
    if (!botMsg.text) { botMsg.text = "⚠ 连接中断，请再试一次"; bubble.innerHTML = md(botMsg.text); }
    finish();
  };
  function finish() {
    es.close();
    bubble.classList.remove("streaming", "cursor");
    if (!botMsg.text) { botMsg.text = "（没有收到回复）"; bubble.innerHTML = md(botMsg.text); }
    // 过程条定格为摘要：谁出的手 + 用了哪些家伙 + 用时
    const secs = ((Date.now() - t0) / 1000).toFixed(1);
    const chain = procChain.filter(x => x !== "组织回答");
    botMsg.proc = (chain.length ? chain.join(" · ") : "超级小博") + " · " + secs + "s";
    stageEl.classList.add("done");
    stageEl.querySelector(".st-ico").textContent = "⚡";
    stageEl.querySelector(".st-txt").textContent = botMsg.proc;

let pendingImage = "";
$("#photoBtn").onclick = () => $("#photoInput").click();
$("#photoInput").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, 800 / Math.max(img.width, img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      pendingImage = cv.toDataURL("image/jpeg", 0.72);
      $("#imgPrev").src = pendingImage;
      $("#imgChip").classList.remove("hidden");
      $("#inp").focus();
    };
    img.src = rd.result;
  };
  rd.readAsDataURL(f);
  e.target.value = "";
});
$("#imgX").onclick = () => { pendingImage = ""; $("#imgChip").classList.add("hidden"); };

/* ───────── 语音输入（浏览器 SpeechRecognition，零后端成本）───────── */
(function initMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;  // 不支持就保持隐藏
  const btn = $("#micBtn");
  btn.classList.remove("hidden");
  const rec = new SR();
  rec.lang = "zh-CN"; rec.interimResults = true;
  let listening = false;
  btn.onclick = () => {
    if (listening) { rec.stop(); return; }
    try { rec.start(); } catch (e) {}
  };
  rec.onstart = () => { listening = true; btn.classList.add("recording"); toast("在听啦，说话吧 🎤"); };
  rec.onend = () => { listening = false; btn.classList.remove("recording"); };
  rec.onerror = () => { listening = false; btn.classList.remove("recording"); };
  rec.onresult = e => {
    let txt = "";
    for (const r of e.results) txt += r[0].transcript;
    $("#inp").value = txt;
  };
})();

async function sendPhoto(text) {
  const inp = $("#inp");
  const img = pendingImage;
  pendingImage = "";
  $("#imgChip").classList.add("hidden");
  sending = true; $("#sendBtn").disabled = true;
  inp.value = ""; inp.style.height = "auto";

  const list = getMsgs();
  list.push({ role: "user", text: text || "帮我看看这张照片", image: img });
  const botMsg = { role: "bot", text: "", events: [{ type: "letter", kind: "photo" }] };
  list.push(botMsg); saveMsgs(list); renderMsgs();

  const box = $("#msgs");
  const bubble = box.lastElementChild.querySelector(".body");
  bubble.classList.add("streaming", "cursor");
  box.scrollTop = box.scrollHeight;
  try {
    const r = await api("api/chat/photo", { method: "POST", body: { session_id: sid, image: img, text } });
    botMsg.text = r.reply || "（没看出什么，能再拍清楚点吗？）";
  } catch (e) { botMsg.text = "⚠ 看照片失败了：" + e.message; }
  bubble.classList.remove("streaming", "cursor");
  bubble.innerHTML = md(botMsg.text);
  saveMsgs(list);
  sending = false; $("#sendBtn").disabled = false;
  $("#inp").focus();
}

/* ───────── 超级小博主动来信 ───────── */
async function checkProactive() {
  try {
    const r = await api("api/proactive?consume=1");
    if (!r.messages || !r.messages.length) return;
    const list = getMsgs();
    r.messages.forEach(m => list.push({
      role: "bot", text: m.text,
      events: [{ type: "letter", kind: m.kind }],
      action: m.mistake_ids && m.mistake_ids.length ? { mistake_ids: m.mistake_ids } : undefined,
    }));
    saveMsgs(list); renderMsgs();
  } catch (e) {}
}
setInterval(checkProactive, 5 * 60 * 1000);

/* ───────── 内容守护弹窗 ───────── */
const MOD_META = {
  mental: { em: "💛", cls: "mod-warm" },
  nsfw: { em: "🛡️", cls: "mod-cool" },
  politics: { em: "🤝", cls: "mod-cool" },
  abuse: { em: "🤗", cls: "mod-warm" },
};
const MOD_DESC = {
  mental: "小博听到你了，你不是一个人。这种感受很难受，但会慢慢过去的——我会一直陪着你。",
  nsfw: "这个话题我们还不能聊哦，换个有意思的吧～",
  politics: "这个话题小博说不太好，可以问问老师或爸爸妈妈。",
  abuse: "嘿，是不是遇到啥不开心的事了？骂人可解决不了问题，跟我唠唠？",
};
function showModeration(d) {
  const m = MOD_META[d.category] || { em: "🤗", cls: "mod-warm" };
  const hotline = d.hotline
    ? `<div class="mod-hot">如果现在很难受，可以拨打<br><b>${esc(d.hotline)}</b>全国心理援助热线 · 24小时</div>` : "";
  const card = $("#modCard");
  card.className = "mod-card " + (m.cls || "mod-warm");
  card.innerHTML = `
    <div class="mod-em">${m.em}</div>
    <div class="mod-title">${esc(d.hint || "换个话题吧")}</div>
    <div class="mod-desc">${esc(MOD_DESC[d.category] || "换个话题继续聊吧～")}</div>
    ${hotline}
    <button class="btn mod-btn" id="modOk">我知道啦</button>`;
  $("#modModal").classList.add("show");
  $("#modOk").onclick = () => $("#modModal").classList.remove("show");
}

/* ───────── 两栏折叠（收起来只剩对话框）───────── */
function applyCollapse() {
  const hideSb = localStorage.getItem("lc_hide_sidebar") === "1";
  const hideCl = localStorage.getItem("lc_hide_convs") === "1";
  document.body.classList.toggle("hide-sidebar", hideSb);
  document.body.classList.toggle("hide-convlist", hideCl);
  $("#clFab").classList.toggle("hidden", !hideCl);
  $("#sbToggle").textContent = hideSb ? "☰" : "☰";
  $("#sbToggle").title = hideSb ? "展开侧栏" : "收起侧栏";
}
$("#sbToggle").onclick = () => {
  localStorage.setItem("lc_hide_sidebar", document.body.classList.contains("hide-sidebar") ? "0" : "1");
  applyCollapse();
};
$("#clToggle").onclick = () => { localStorage.setItem("lc_hide_convs", "1"); applyCollapse(); };
$("#clFab").onclick = () => { localStorage.setItem("lc_hide_convs", "0"); applyCollapse(); };
applyCollapse();

/* ───────── 启动 ───────── */
if (!curUid) {                     // 第一次来：先建好专属空间，再见面认识
  curUid = newUid();
  localStorage.setItem("lc_uid", curUid);
}
bootInto();
checkOnboard();                    // 有名字直接进入；没名字先认识一下
setTimeout(checkProactive, 800);
setInterval(refreshStatus, 30000);
</script>
</body>
</html>
